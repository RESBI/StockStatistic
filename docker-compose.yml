services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stockstat
      POSTGRES_USER: stockstat
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockstat -d stockstat"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-07-23T15-54-02Z
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio-init:
    image: minio/mc:RELEASE.2025-07-21T05-28-08Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      mc mb --ignore-existing local/stockstat-v31"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}

  storage:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: >
      stockstat-storage --host 0.0.0.0 --port 8101
      --database-url postgresql://stockstat:${POSTGRES_PASSWORD}@postgres:5432/stockstat
      --artifact-root /var/lib/stockstat
      --s3-bucket stockstat-v31 --s3-endpoint http://minio:9000
      --api-token ${STOCKSTAT_CLIENT_TOKEN}=data,artifacts
      --internal-token ${STOCKSTAT_INTERNAL_TOKEN}
    environment:
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://127.0.0.1:8101/health/ready').raise_for_status()"]
      interval: 5s
      timeout: 3s
      retries: 20
    read_only: true
    tmpfs:
      - /tmp
      - /var/lib/stockstat

  dispatcher:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: >
      stockstat-dispatcher --host 0.0.0.0 --port 8100
      --database-url postgresql://stockstat:${POSTGRES_PASSWORD}@postgres:5432/stockstat
      --storage-url http://storage:8101
      --api-token ${STOCKSTAT_CLIENT_TOKEN}=jobs,cluster
      --internal-token ${STOCKSTAT_INTERNAL_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      storage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://127.0.0.1:8100/health/ready').raise_for_status()"]
      interval: 5s
      timeout: 3s
      retries: 20
    read_only: true
    tmpfs:
      - /tmp

  worker:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    command: >
      stockstat-worker --dispatcher-url http://dispatcher:8100
      --storage-url http://storage:8101 --root /var/lib/stockstat-worker
      --internal-token ${STOCKSTAT_INTERNAL_TOKEN}
    depends_on:
      dispatcher:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp
      - /var/lib/stockstat-worker
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: "2"
          memory: 2G

volumes:
  postgres_data:
  minio_data:
