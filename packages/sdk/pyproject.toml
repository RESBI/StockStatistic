[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "stockstat"
version = "3.1.0"
description = "StockStat V3.1 public SDK"
requires-python = ">=3.11,<3.13"
dependencies = ["stockstat-contracts==3.1.0", "httpx>=0.28,<1", "pyarrow>=18,<26", "pandas>=2.2,<3"]

[project.scripts]
stockstat = "stockstat.cli:main"

[tool.setuptools.packages.find]
include = ["stockstat*"]
