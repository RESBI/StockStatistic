[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"

[project]
name = "stockstat-kernel"
version = "3.1.0"
description = "StockStat V3.1 finance kernel"
requires-python = ">=3.11,<3.13"
dependencies = [
    "stockstat-contracts==3.1.0",
    "pandas>=2.2,<3",
    "numpy>=1.26,<3",
    "scipy>=1.13,<2",
    "pyarrow>=18,<26",
]

[project.optional-dependencies]
signal = ["PyWavelets>=1.7,<2"]

[tool.setuptools.packages.find]
include = ["stockstat_kernel*"]
